name: TUST BACK CI

# 当代码 push 到 main 分支，或者针对 main 分支提 PR 时触发
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# 具体的任务
jobs:
  build:
    # 指定运行的服务器环境，这里用最新的 Ubuntu
    runs-on: ubuntu-latest

    # 任务的具体步骤
    steps:
    # 把你的代码拉取到 GitHub 的虚拟机里
    - name: Checkout code
      uses: actions/checkout@v3

    # 在虚拟机里安装并配置 Java 环境 (这里以 JDK 17 为例)
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven # 自动缓存 Maven 依赖，加快后续构建速度

    # 执行 Maven 命令进行编译和打包
    - name: Build with Maven
      run: mvn clean package -DskipTests
      
    # 跑单测
    - name: Run Tests
      run: mvn test
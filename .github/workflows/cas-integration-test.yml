name: CAS Integration Test

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'src/**'
      - 'frontend/src/**'
      - '.github/workflows/cas-integration-test.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'src/**'
      - 'frontend/src/**'
      - '.github/workflows/cas-integration-test.yml'

jobs:
  # 后端集成测试
  backend-integration-test:
    runs-on: ubuntu-latest
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: test123
          MYSQL_DATABASE: innovation_platform_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
      
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Run Backend Integration Tests
      run: |
        ./mvnw test -Dtest=CasAuthIntegrationTest,CasFrontendIntegrationTest \
          -Dspring.profiles.active=test \
          -Dspring.data.redis.host=localhost \
          -Dspring.data.redis.port=6379

    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: backend-test-results
        path: target/surefire-reports/

  # 前端单元测试
  frontend-unit-test:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4
        with:
          # 递归检出子模块（前端代码）
          submodules: recursive
          # 获取完整历史以便生成版本号
          fetch-depth: 0
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Dependencies
        run: npm i

      - name: Run Frontend Unit Tests
        run: npm run test

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-results
          path: |
            frontend/coverage/
            frontend/test-results/

  # 构建验证测试
  build-verification:
    runs-on: ubuntu-latest
    needs: [backend-integration-test, frontend-unit-test]
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: './frontend/package-lock.json'

    - name: Build Frontend
      working-directory: ./frontend
      run: |
        npm ci
        npm run build

    - name: Build Backend
      run: |
        ./mvnw clean package -DskipTests

    - name: Verify Docker Build
      run: |
        docker build -t innovation-backend:test .
        docker build -t innovation-frontend:test ./frontend

  # 端到端API测试（使用Docker Compose）
  e2e-api-test:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and Start Services
      run: |
        # 创建测试配置
        cat > .env.test << EOF
        CAS_ENABLED=true
        CAS_MOCK_MODE=true
        CAS_SERVER_URL_PREFIX=http://mock-cas-server/authserver
        CAS_SERVER_LOGIN_URL=http://mock-cas-server/authserver/login
        CAS_CLIENT_HOST_URL=http://localhost:8080/api
        JWT_SECRET=test-secret-key-123456
        JWT_EXPIRATION=86400000
        MYSQL_ROOT_PASSWORD=test123
        MYSQL_DATABASE=innovation_platform_test
        GITHUB_OWNER=tust-open-source-club
        EOF
        
        # 构建并启动（使用测试配置）
        docker compose -f docker-compose.yml --env-file .env.test up -d mysql redis backend
        
        # 等待服务启动
        sleep 30
        
        # 健康检查
        curl --retry 10 --retry-delay 5 --fail http://localhost:8080/api/auth/cas/status || exit 1

    - name: Run API Tests
      run: |
        # 安装newman用于API测试
        npm install -g newman
        
        # 运行Postman集合（如果有的话）
        newman run docs/cas-integration-tests.json
        
        # 或者使用curl测试关键流程
        #echo "Testing CAS status..."
        #curl -s http://localhost:8080/api/auth/cas/status | grep -q '"enabled":true' && echo "✓ CAS enabled"
        
        #echo "Testing CAS login redirect..."
        #curl -s -L http://localhost:8080/api/auth/cas/login | grep -q "cas-callback" && echo "✓ Login redirect works"

    - name: Cleanup
      if: always()
      run: |
        docker-compose -f docker-compose.yml down -v
        docker system prune -f

    - name: Upload Logs
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: docker-logs
        path: |
          /var/log/containers/
          /tmp/docker-logs/

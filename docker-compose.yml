version: '3.8'

services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: innovation_mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      MYSQL_DATABASE: innovation_platform
      TZ: Asia/Shanghai
    expose:
      - "3306"
    volumes:
      - /srv/innovation/mysql_data:/var/lib/mysql
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - innovation_network
    restart: unless-stopped

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: innovation_redis
    expose:
      - "6379"
    volumes:
      - /srv/innovation/redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - innovation_network
    restart: unless-stopped

  # 后端应用
  backend:
    image: ghcr.io/${GITHUB_OWNER:-your-username}/innovation-platform-backend:latest
    container_name: innovation_backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/innovation_platform?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-root}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_DATABASE: 1
      MINIO_URL: ${MINIO_URL:-http://host.docker.internal:9000}
      MINIO_ACCESSKEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRETKEY: ${MINIO_SECRET_KEY:-minioadmin}
      JWT_SECRET: ${JWT_SECRET:-innovation-platform-secret-key-2024}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      # CAS统一身份认证配置
      CAS_ENABLED: ${CAS_ENABLED:-false}
      CAS_MOCK_MODE: ${CAS_MOCK_MODE:-false}
      CAS_SERVER_URL_PREFIX: ${CAS_SERVER_URL_PREFIX:-http://ids.wisedu.com.cn:9086/authserver}
      CAS_SERVER_LOGIN_URL: ${CAS_SERVER_LOGIN_URL:-http://ids.wisedu.com.cn:9086/authserver/login}
      CAS_CLIENT_HOST_URL: ${CAS_CLIENT_HOST_URL:-http://localhost:8080/api}
    expose:
      - "8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - innovation_network
    restart: unless-stopped
    # Watchtower 监控标签
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # 前端应用
  frontend:
    image: ghcr.io/${GITHUB_OWNER:-your-username}/innovation-platform-frontend:latest
    container_name: innovation_frontend
    expose:
      - "80"
    depends_on:
      - backend
    networks:
      - innovation_network
    restart: unless-stopped
    # Watchtower 监控标签
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # Nginx 反向代理
  nginx:
    image: nginx:alpine
    container_name: innovation_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    networks:
      - innovation_network
    restart: unless-stopped

  # Watchtower - 自动更新容器
  watchtower:
    image: nickfedor/watchtower:latest
    container_name: watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      # 每 30 秒检查一次更新
      WATCHTOWER_POLL_INTERVAL: 30
      # 自动清理旧镜像
      WATCHTOWER_CLEANUP: "true"
      # 只监控带有特定标签的容器
      WATCHTOWER_LABEL_ENABLE: "true"
      # 时区设置
      TZ: Asia/Shanghai
      # 可选：配置通知（支持 Slack、Discord、Email 等）
      # WATCHTOWER_NOTIFICATIONS: email
      # WATCHTOWER_NOTIFICATION_EMAIL_FROM: 
      # WATCHTOWER_NOTIFICATION_EMAIL_TO: 
      # WATCHTOWER_NOTIFICATION_EMAIL_SERVER: 
      # WATCHTOWER_NOTIFICATION_EMAIL_SERVER_PORT: 587
    command: --label-enable
    networks:
      - innovation_network
    restart: unless-stopped

networks:
  innovation_network:
    driver: bridge
